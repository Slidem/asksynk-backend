services:
  nats:
    image: "nats:2.10-alpine"
    container_name: asksynk-nats
    ports:
      - "4222:4222"
      - "8222:8222"
  postgres:
    image: "pgvector/pgvector:pg17"
    container_name: asksynk-postgres
    environment:
      POSTGRES_DB: asksynk
      POSTGRES_USER: asksynk
      POSTGRES_PASSWORD: asksynk
    ports:
      - "5432:5432"
    volumes:
      - asksynk-postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asksynk -d asksynk"]
      interval: 5s
      timeout: 5s
      retries: 10
  keycloak:
    image: "quay.io/keycloak/keycloak:26.3"
    container_name: asksynk-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  asksynk-postgres-data:
