services:
  postgres:
    image: "pgvector/pgvector:pg18"
    container_name: asksynk-postgres
    environment:
      POSTGRES_DB: asksynk
      POSTGRES_USER: asksynk
      POSTGRES_PASSWORD: asksynk
    ports:
      - "5432:5432"
    volumes:
      - asksynk-postgres-data:/var/lib/postgresql
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asksynk -d asksynk"]
      interval: 5s
      timeout: 5s
      retries: 10
  pgboss-dashboard:
    image: node:20-alpine
    container_name: asksynk-pgboss-dashboard
    command: ["npx", "-y", "pg-boss-admin-dashboard@latest", "--no-browser"]
    ports:
      - "8671:8671"
    environment:
      PGBOSS_DATABASE_URL: postgres://asksynk:asksynk@postgres:5432/asksynk
      PGBOSS_NO_BROWSER: "1"
    depends_on:
      postgres:
        condition: service_healthy
  mailpit:
    image: "axllent/mailpit:latest"
    container_name: asksynk-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # Garage image is distroless (no shell). Bootstrap is a host script run once after
  # `localdev:up`: `bash localdev/garage/init.sh` (layout, key, buckets, website, CORS).
  garage:
    image: "dxflrs/garage:v1.0.1"
    container_name: asksynk-garage
    ports:
      - "3900:3900" # S3 API
      - "3902:3902" # web (public bucket)
      - "3903:3903" # admin API
    volumes:
      - ./garage/garage.toml:/etc/garage/garage.toml:ro
      - asksynk-garage-meta:/var/lib/garage/meta
      - asksynk-garage-data:/var/lib/garage/data
    entrypoint: ["/garage"]
    command: ["-c", "/etc/garage/garage.toml", "server"]

volumes:
  asksynk-postgres-data:
  asksynk-garage-meta:
  asksynk-garage-data:
